{{ define "main" }}
<main class="max-w-4xl mx-auto px-4 sm:px-6 py-12 md:py-16">
  <h1 class="font-mono text-xl sm:text-2xl font-bold text-surface-tint matrix-glow mb-8 select-none">&gt; {{ .Title | upper }}</h1>
  <div class="flex flex-col gap-8 md:gap-10">
    {{ range .Pages }}
    <article class="group relative transition-all duration-300 pb-8 border-b border-outline-variant/30">
      <div class="flex flex-col items-start">
        <h2 class="font-mono text-base sm:text-lg mb-4 text-primary group-hover:text-surface-tint transition-all">
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h2>
        <p class="font-mono text-xs text-outline select-none">{{ len .Pages }} post(s)</p>
      </div>
    </article>
    {{ end }}
  </div>
</main>
{{ end }}
