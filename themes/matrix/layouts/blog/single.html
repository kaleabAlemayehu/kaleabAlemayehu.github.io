{{ define "main" }}
<main class="max-w-4xl mx-auto px-4 sm:px-6 py-12 md:py-16">
  <div class="mb-8">
    <a href="/blog/" class="font-mono text-xs text-primary-container hover:text-surface-tint hover:drop-shadow-[0_0_8px_#00e639] transition-all select-none">[RETURN_TO_ARCHIVE]</a>
  </div>
  <header class="pb-6 border-b border-outline-variant/30 mb-8">
    <div class="flex flex-wrap gap-2 mb-3 select-none">
      {{ with .Params.categories }}{{ range . }}
      <span class="px-2 py-1 border border-secondary text-secondary font-mono text-xs">[ {{ . | upper }} ]</span>
      {{ end }}{{ end }}
    </div>
    <h1 class="font-mono text-xl sm:text-2xl md:text-3xl text-primary-container mb-3 leading-tight">{{ .Title }}</h1>
    <div class="font-mono text-xs text-outline flex items-center gap-3 sm:gap-4 flex-wrap select-none">
      <span>TIMESTAMP: {{ .Date.Format "2006.01.02.15:04:05" }}</span>
    </div>
  </header>
  <article class="max-w-4xl space-y-6 font-mono text-sm text-on-surface leading-relaxed">
    {{ .Content }}
  </article>
  {{ with .Params.tags }}
  <div class="mt-8 pt-6 border-t border-outline-variant flex flex-wrap gap-2 select-none">
    {{ range . }}
    <a class="font-mono text-xs text-secondary hover:text-surface-tint hover:drop-shadow-[0_0_8px_#00e639] transition-all border border-outline-variant px-2 py-1" href="{{ "tags/" | relLangURL }}{{ . | urlize | lower }}/">[ {{ . | upper }} ]</a>
    {{ end }}
  </div>
  {{ end }}
</main>
{{ end }}
